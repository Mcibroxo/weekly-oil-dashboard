name: Weekly Data Update

on:
  schedule:
    # Run every Wednesday and Thursday at 15:30 UTC (11:30 AM EDT/10:30 AM EST)
    # The report typically comes out on Wednesday at 10:30 AM ET
    - cron: '30 15 * * 3,4'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add table1.csv filtered_crude_oil_data.csv oil_dashboard_data.json index.html
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Auto-update data and dashboard"
          git push
